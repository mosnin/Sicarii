# Single-package workspace rooted at the repo. pnpm 10 requires a non-empty
# `packages` field to treat this file as valid; without it a fresh clone fails
# `pnpm install` with "packages field missing or empty".
packages:
  - .

# Allow these dependencies to run install/build scripts (pnpm gates them by default).
# Prisma must generate its client + engines; sharp builds native image bindings.
onlyBuiltDependencies:
  - '@clerk/shared'
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - sharp
  - msgpackr-extract
  - unrs-resolver
